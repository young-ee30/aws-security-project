name: Deploy Selected Services to ECS

on:
  workflow_run:
    workflows: ["Terraform Dev Plan and Apply"]
    types: [completed]
  workflow_dispatch:
    inputs:
      deploy_frontend:
        description: Deploy frontend
        required: true
        default: true
        type: boolean
      deploy_active_backend:
        description: Deploy backend selected by terraform/envs/dev/terraform.tfvars active_backend
        required: true
        default: true
        type: boolean

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2

jobs:
  resolve-targets:
    name: Resolve Deployment Targets
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event != 'pull_request') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      head_sha: ${{ steps.context.outputs.head_sha }}
      active_backend: ${{ steps.active-backend.outputs.active_backend }}
      has_targets: ${{ steps.targets.outputs.has_targets }}
      matrix: ${{ steps.targets.outputs.matrix }}

    steps:
      - name: Resolve commit SHA
        id: context
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "head_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "head_sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout target revision
        uses: actions/checkout@v5
        with:
          fetch-depth: 2
          ref: ${{ steps.context.outputs.head_sha }}

      - name: Resolve active backend from Terraform config
        id: active-backend
        shell: bash
        run: |
          ACTIVE_BACKEND=$(sed -n 's/^active_backend[[:space:]]*=[[:space:]]*"\(.*\)"/\1/p' terraform/envs/dev/terraform.tfvars | head -n 1)

          if [ -z "$ACTIVE_BACKEND" ]; then
            echo "Could not read active_backend from terraform/envs/dev/terraform.tfvars" >&2
            exit 1
          fi

          case "$ACTIVE_BACKEND" in
            api-node|api-python|api-spring) ;;
            *)
              echo "Unsupported active_backend: $ACTIVE_BACKEND" >&2
              exit 1
              ;;
          esac

          echo "active_backend=$ACTIVE_BACKEND" >> "$GITHUB_OUTPUT"

      - name: Build service matrix
        id: targets
        shell: bash
        env:
          ACTIVE_BACKEND: ${{ steps.active-backend.outputs.active_backend }}
        run: |
          TARGETS=()

          add_target() {
            local target="$1"
            for existing in "${TARGETS[@]}"; do
              if [ "$existing" = "$target" ]; then
                return 0
              fi
            done
            TARGETS+=("$target")
          }

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            [ "${{ inputs.deploy_frontend }}" = "true" ] && add_target "frontend"
            [ "${{ inputs.deploy_active_backend }}" = "true" ] && add_target "$ACTIVE_BACKEND"

            if [ "${#TARGETS[@]}" -eq 0 ]; then
              echo "Select at least one target to deploy." >&2
              exit 1
            fi
          else
            if ! git rev-parse "${{ steps.context.outputs.head_sha }}^" >/dev/null 2>&1; then
              add_target "frontend"
              add_target "$ACTIVE_BACKEND"
            else
              CHANGED_FILES=$(git diff --name-only "${{ steps.context.outputs.head_sha }}^" "${{ steps.context.outputs.head_sha }}")

              if echo "$CHANGED_FILES" | grep -Eq '^(terraform/|\.github/actions/|\.github/workflows/)'; then
                add_target "frontend"
                add_target "$ACTIVE_BACKEND"
              else
                echo "$CHANGED_FILES" | grep -Eq '^services/frontend/ecommerce-app-frontend/frontend/' && add_target "frontend"

                case "$ACTIVE_BACKEND" in
                  api-node)
                    echo "$CHANGED_FILES" | grep -Eq '^services/ecommerce-app-node/' && add_target "$ACTIVE_BACKEND"
                    ;;
                  api-python)
                    echo "$CHANGED_FILES" | grep -Eq '^services/ecommerce-app-fastapi/' && add_target "$ACTIVE_BACKEND"
                    ;;
                  api-spring)
                    echo "$CHANGED_FILES" | grep -Eq '^services/ecommerce-app-spring/' && add_target "$ACTIVE_BACKEND"
                    ;;
                esac
              fi
            fi

            if [ "${#TARGETS[@]}" -eq 0 ]; then
              echo "has_targets=false" >> "$GITHUB_OUTPUT"
              echo 'matrix={"include":[{"job_name":"이미 배포된 서비스 유지","service":"__noop__","skip_deploy":"true"}]}' >> "$GITHUB_OUTPUT"
              {
                echo "## ECS deployment"
                echo ""
                echo "- Result: no new ECS deployment was required."
                echo "- Meaning: current services are already deployed and running."
                echo "- Reason: no frontend or active backend changes were detected for this revision."
              } >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
          fi

          JSON_TARGETS=""
          for target in "${TARGETS[@]}"; do
            JSON_TARGETS="${JSON_TARGETS}{\"job_name\":\"Deploy ${target}\",\"service\":\"${target}\",\"skip_deploy\":\"false\"},"
          done

          echo "has_targets=true" >> "$GITHUB_OUTPUT"
          echo "matrix={\"include\":[${JSON_TARGETS%,}]}" >> "$GITHUB_OUTPUT"

  deploy-selected:
    name: ${{ matrix.job_name }}
    needs: resolve-targets
    if: needs.resolve-targets.result == 'success'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve-targets.outputs.matrix) }}

    steps:
      - name: Explain current deployment state
        if: matrix.skip_deploy == 'true'
        shell: bash
        run: |
          echo "Current ECS services are already deployed and running."
          echo "No new deployment was required for this revision."
          {
            echo "## ECS deployment"
            echo ""
            echo "- Result: existing ECS services remain deployed and running."
            echo "- Action: skipped a new deployment because no deployable changes were detected."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout target revision
        if: matrix.skip_deploy != 'true'
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve-targets.outputs.head_sha }}

      - name: Resolve service configuration
        if: matrix.skip_deploy != 'true'
        id: config
        shell: bash
        run: |
          case "${{ matrix.service }}" in
            api-node)
              echo "app_path=services/ecommerce-app-node/api-server" >> "$GITHUB_OUTPUT"
              echo "ecr_repository=devsecops-dev/api-node" >> "$GITHUB_OUTPUT"
              echo "ecs_service=devsecops-dev-api-node" >> "$GITHUB_OUTPUT"
              echo "ecs_cluster=devsecops-dev-cluster" >> "$GITHUB_OUTPUT"
              echo "ecs_task_definition=devsecops-dev-api-node" >> "$GITHUB_OUTPUT"
              echo "container_name=api-node" >> "$GITHUB_OUTPUT"
              ;;
            api-python)
              echo "app_path=services/ecommerce-app-fastapi/api-server-fastapi" >> "$GITHUB_OUTPUT"
              echo "ecr_repository=devsecops-dev/api-python" >> "$GITHUB_OUTPUT"
              echo "ecs_service=devsecops-dev-api-python" >> "$GITHUB_OUTPUT"
              echo "ecs_cluster=devsecops-dev-cluster" >> "$GITHUB_OUTPUT"
              echo "ecs_task_definition=devsecops-dev-api-python" >> "$GITHUB_OUTPUT"
              echo "container_name=api-python" >> "$GITHUB_OUTPUT"
              ;;
            api-spring)
              echo "app_path=services/ecommerce-app-spring/api-server-spring" >> "$GITHUB_OUTPUT"
              echo "ecr_repository=devsecops-dev/api-spring" >> "$GITHUB_OUTPUT"
              echo "ecs_service=devsecops-dev-api-spring" >> "$GITHUB_OUTPUT"
              echo "ecs_cluster=devsecops-dev-cluster" >> "$GITHUB_OUTPUT"
              echo "ecs_task_definition=devsecops-dev-api-spring" >> "$GITHUB_OUTPUT"
              echo "container_name=api-spring" >> "$GITHUB_OUTPUT"
              ;;
            frontend)
              echo "app_path=services/frontend/ecommerce-app-frontend/frontend" >> "$GITHUB_OUTPUT"
              echo "ecr_repository=devsecops-dev/frontend" >> "$GITHUB_OUTPUT"
              echo "ecs_service=devsecops-dev-frontend" >> "$GITHUB_OUTPUT"
              echo "ecs_cluster=devsecops-dev-cluster" >> "$GITHUB_OUTPUT"
              echo "ecs_task_definition=devsecops-dev-frontend" >> "$GITHUB_OUTPUT"
              echo "container_name=frontend" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported service: ${{ matrix.service }}" >&2
              exit 1
              ;;
          esac

      - name: Deploy selected service
        if: matrix.skip_deploy != 'true'
        uses: ./.github/actions/deploy-ecs-service
        with:
          aws_region: ${{ env.AWS_REGION }}
          aws_role_arn: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          image_tag: ${{ needs.resolve-targets.outputs.head_sha }}
          app_path: ${{ steps.config.outputs.app_path }}
          ecr_repository: ${{ steps.config.outputs.ecr_repository }}
          ecs_service: ${{ steps.config.outputs.ecs_service }}
          ecs_cluster: ${{ steps.config.outputs.ecs_cluster }}
          ecs_task_definition: ${{ steps.config.outputs.ecs_task_definition }}
          container_name: ${{ steps.config.outputs.container_name }}

          
