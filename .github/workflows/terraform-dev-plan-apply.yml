name: Terraform Dev Plan and Apply

on:
  workflow_run:
    workflows: ["Bootstrap Terraform State"]
    types: [completed]
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/actions/**"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: terraform-dev-state
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: ap-northeast-2
  TF_VERSION: "1.11.0"
  TF_WORKING_DIR: terraform/envs/dev
  DEFAULT_PROJECT_NAME: devsecops

jobs:
  terraform-plan:
    name: Terraform Plan & Security Scan
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
    defaults:
      run:
        working-directory: terraform/envs/dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Resolve state bucket
        id: state-bucket
        shell: bash
        run: |
          if [ -n "${{ vars.TF_STATE_BUCKET }}" ]; then
            echo "bucket_name=${{ vars.TF_STATE_BUCKET }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PREFIX="${{ env.DEFAULT_PROJECT_NAME }}-tfstate-"
          mapfile -t BUCKETS < <(aws s3api list-buckets \
            --query "Buckets[?starts_with(Name, '${PREFIX}')].Name" \
            --output text | tr '\t' '\n' | grep -v '^$')

          if [ "${#BUCKETS[@]}" -eq 0 ]; then
            echo "No Terraform state bucket found."
            echo "Run bootstrap-terraform-state.yml first or set TF_STATE_BUCKET manually."
            exit 1
          fi

          if [ "${#BUCKETS[@]}" -gt 1 ]; then
            STATEFUL_BUCKETS=()
            for BUCKET in "${BUCKETS[@]}"; do
              LAST_MODIFIED=$(aws s3api head-object \
                --bucket "$BUCKET" \
                --key "dev/terraform.tfstate" \
                --query 'LastModified' \
                --output text 2>/dev/null || true)

              if [ -n "$LAST_MODIFIED" ] && [ "$LAST_MODIFIED" != "None" ]; then
                STATEFUL_BUCKETS+=("${LAST_MODIFIED}|${BUCKET}")
              fi
            done

            if [ "${#STATEFUL_BUCKETS[@]}" -gt 0 ]; then
              LATEST_BUCKET=$(printf '%s\n' "${STATEFUL_BUCKETS[@]}" | sort | tail -n 1 | cut -d'|' -f2)
            else
              LATEST_BUCKET=$(aws s3api list-buckets \
                --query "reverse(sort_by(Buckets[?starts_with(Name, '${PREFIX}')], &CreationDate))[0].Name" \
                --output text)
            fi
            echo "Multiple Terraform state buckets found: ${BUCKETS[*]}"
            echo "Reusing the most recent bucket: $LATEST_BUCKET"
            echo "bucket_name=$LATEST_BUCKET" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "bucket_name=${BUCKETS[0]}" >> "$GITHUB_OUTPUT"

      - name: Check Terraform secrets
        run: |
          if [ -z "$TF_VAR_db_password" ]; then
            echo "TF_VAR_DB_PASSWORD repository secret is not set."
            exit 1
          fi

      - name: Create backend config
        run: |
          cat > backend.hcl << EOF
          bucket         = "${{ steps.state-bucket.outputs.bucket_name }}"
          region         = "${{ env.AWS_REGION }}"
          encrypt        = true
          EOF

      - name: Terraform Format
        id: fmt
        run: terraform fmt -check -recursive ../../
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init -backend-config=backend.hcl

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Checkov IaC Scan
        id: checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          external_checks_dirs: security/checkov/custom_policies
          output_format: cli
          soft_fail: false

      - name: Terraform Plan
        id: plan
        run: terraform plan -lock-timeout=10m -no-color -out=tfplan

  terraform-apply:
    name: Terraform Apply
    needs: terraform-plan
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event != 'pull_request') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    env:
      TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
    defaults:
      run:
        working-directory: terraform/envs/dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Resolve state bucket
        id: state-bucket
        shell: bash
        run: |
          if [ -n "${{ vars.TF_STATE_BUCKET }}" ]; then
            echo "bucket_name=${{ vars.TF_STATE_BUCKET }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PREFIX="${{ env.DEFAULT_PROJECT_NAME }}-tfstate-"
          mapfile -t BUCKETS < <(aws s3api list-buckets \
            --query "Buckets[?starts_with(Name, '${PREFIX}')].Name" \
            --output text | tr '\t' '\n' | grep -v '^$')

          if [ "${#BUCKETS[@]}" -eq 0 ]; then
            echo "No Terraform state bucket found."
            echo "Run bootstrap-terraform-state.yml first or set TF_STATE_BUCKET manually."
            exit 1
          fi

          if [ "${#BUCKETS[@]}" -gt 1 ]; then
            STATEFUL_BUCKETS=()
            for BUCKET in "${BUCKETS[@]}"; do
              LAST_MODIFIED=$(aws s3api head-object \
                --bucket "$BUCKET" \
                --key "dev/terraform.tfstate" \
                --query 'LastModified' \
                --output text 2>/dev/null || true)

              if [ -n "$LAST_MODIFIED" ] && [ "$LAST_MODIFIED" != "None" ]; then
                STATEFUL_BUCKETS+=("${LAST_MODIFIED}|${BUCKET}")
              fi
            done

            if [ "${#STATEFUL_BUCKETS[@]}" -gt 0 ]; then
              LATEST_BUCKET=$(printf '%s\n' "${STATEFUL_BUCKETS[@]}" | sort | tail -n 1 | cut -d'|' -f2)
            else
              LATEST_BUCKET=$(aws s3api list-buckets \
                --query "reverse(sort_by(Buckets[?starts_with(Name, '${PREFIX}')], &CreationDate))[0].Name" \
                --output text)
            fi
            echo "Multiple Terraform state buckets found: ${BUCKETS[*]}"
            echo "Reusing the most recent bucket: $LATEST_BUCKET"
            echo "bucket_name=$LATEST_BUCKET" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "bucket_name=${BUCKETS[0]}" >> "$GITHUB_OUTPUT"

      - name: Check Terraform secrets
        run: |
          if [ -z "$TF_VAR_db_password" ]; then
            echo "TF_VAR_DB_PASSWORD repository secret is not set."
            exit 1
          fi

      - name: Create backend config
        run: |
          cat > backend.hcl << EOF
          bucket         = "${{ steps.state-bucket.outputs.bucket_name }}"
          region         = "${{ env.AWS_REGION }}"
          encrypt        = true
          EOF

      - name: Terraform Init
        run: terraform init -backend-config=backend.hcl

      - name: Import orphan IAM roles before apply
        shell: bash
        run: |
          NAME_PREFIX=$(sed -n 's/^name_prefix[[:space:]]*=[[:space:]]*"\(.*\)"/\1/p' terraform.tfvars | head -n 1)

          if [ -z "$NAME_PREFIX" ]; then
            echo "Could not read name_prefix from terraform.tfvars"
            exit 1
          fi

          import_role_if_needed() {
            local tf_address="$1"
            local role_name="$2"

            if terraform state list 2>/dev/null | grep -qx "$tf_address"; then
              echo "IAM role is already tracked in Terraform state: $role_name"
              return 0
            fi

            if aws iam get-role --role-name "$role_name" >/dev/null 2>&1; then
              echo "Found existing IAM role '$role_name'. Importing into Terraform state."
              terraform import "$tf_address" "$role_name"
            else
              echo "No pre-existing IAM role found for '$role_name'."
            fi
          }

          import_role_if_needed "module.security.aws_iam_role.ecs_task_execution" "${NAME_PREFIX}-ecs-task-execution-role"
          import_role_if_needed "module.security.aws_iam_role.ecs_task" "${NAME_PREFIX}-ecs-task-role"

      - name: Import orphan CloudWatch log groups before apply
        shell: bash
        run: |
          NAME_PREFIX=$(sed -n 's/^name_prefix[[:space:]]*=[[:space:]]*"\(.*\)"/\1/p' terraform.tfvars | head -n 1)

          if [ -z "$NAME_PREFIX" ]; then
            echo "Could not read name_prefix from terraform.tfvars"
            exit 1
          fi

          import_log_group_if_needed() {
            local service_name="$1"
            local tf_address="module.logging.aws_cloudwatch_log_group.service[\"${service_name}\"]"
            local log_group_name="/ecs/${NAME_PREFIX}/${service_name}"

            FOUND=$(aws logs describe-log-groups \
              --log-group-name-prefix "${log_group_name}" \
              --query "logGroups[?logGroupName=='${log_group_name}'].logGroupName" \
              --output text 2>/dev/null || true)

            if [ -z "$FOUND" ] || [ "$FOUND" = "None" ]; then
              echo "No pre-existing log group found for '${log_group_name}'."
              return 0
            fi

            echo "Found existing log group '${log_group_name}'. Attempting import..."
            IMPORT_OUTPUT=$(terraform import "${tf_address}" "${log_group_name}" 2>&1) || {
              if echo "$IMPORT_OUTPUT" | grep -q "Resource already managed by Terraform"; then
                echo "Log group '${log_group_name}' is already managed by Terraform, skipping."
                return 0
              fi
              echo "$IMPORT_OUTPUT"
              return 1
            }
            echo "$IMPORT_OUTPUT"
          }

          mapfile -t SERVICES < <(grep -oP '^\s{2}\K[a-z][a-z0-9-]+(?=\s*=\s*\{)' terraform.tfvars)

          for SERVICE in "${SERVICES[@]}"; do
            import_log_group_if_needed "$SERVICE"
          done

      - name: Clean orphan EFS before apply
        shell: bash
        run: |
          NAME_PREFIX=$(sed -n 's/^name_prefix[[:space:]]*=[[:space:]]*"\(.*\)"/\1/p' terraform.tfvars | head -n 1)
          CREATION_TOKEN="${NAME_PREFIX}-efs"
          RESOURCE_ADDRESS="module.storage.aws_efs_file_system.shared"

          if [ -z "$NAME_PREFIX" ]; then
            echo "Could not read name_prefix from terraform.tfvars"
            exit 1
          fi

          if terraform state list 2>/dev/null | grep -qx "$RESOURCE_ADDRESS"; then
            echo "EFS is already tracked in Terraform state."
            exit 0
          fi

          mapfile -t FILE_SYSTEM_IDS < <(
            aws efs describe-file-systems \
              --region "${{ env.AWS_REGION }}" \
              --query "FileSystems[?CreationToken=='${CREATION_TOKEN}'].FileSystemId" \
              --output text | tr '\t' '\n' | grep -v '^$'
          )

          if [ "${#FILE_SYSTEM_IDS[@]}" -eq 0 ]; then
            echo "No orphan EFS found for creation token: ${CREATION_TOKEN}"
            exit 0
          fi

          echo "Found orphan EFS resources for creation token '${CREATION_TOKEN}'. Cleaning them up before apply."

          for FS_ID in "${FILE_SYSTEM_IDS[@]}"; do
            mapfile -t MOUNT_TARGET_IDS < <(
              aws efs describe-mount-targets \
                --region "${{ env.AWS_REGION }}" \
                --file-system-id "${FS_ID}" \
                --query 'MountTargets[].MountTargetId' \
                --output text | tr '\t' '\n' | grep -v '^$'
            )

            for MOUNT_TARGET_ID in "${MOUNT_TARGET_IDS[@]}"; do
              aws efs delete-mount-target \
                --region "${{ env.AWS_REGION }}" \
                --mount-target-id "${MOUNT_TARGET_ID}"
            done

            while true; do
              REMAINING_MOUNT_TARGETS=$(
                aws efs describe-mount-targets \
                  --region "${{ env.AWS_REGION }}" \
                  --file-system-id "${FS_ID}" \
                  --query 'MountTargets[].MountTargetId' \
                  --output text 2>/dev/null || true
              )

              if [ -z "${REMAINING_MOUNT_TARGETS}" ] || [ "${REMAINING_MOUNT_TARGETS}" = "None" ]; then
                break
              fi

              sleep 10
            done

            aws efs delete-file-system \
              --region "${{ env.AWS_REGION }}" \
              --file-system-id "${FS_ID}"

            while true; do
              FILE_SYSTEM_STATE=$(
                aws efs describe-file-systems \
                  --region "${{ env.AWS_REGION }}" \
                  --file-system-id "${FS_ID}" \
                  --query 'FileSystems[0].LifeCycleState' \
                  --output text 2>/dev/null || true
              )

              if [ -z "${FILE_SYSTEM_STATE}" ] || [ "${FILE_SYSTEM_STATE}" = "None" ]; then
                break
              fi

              sleep 10
            done
          done

      - name: Terraform Apply
        run: terraform apply -lock-timeout=10m -auto-approve -no-color

        
