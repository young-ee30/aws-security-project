name: Bootstrap Terraform State

on:
  push:
    branches: [main, young]
    paths:
      - "terraform/**"
      - "services/ecommerce-app-node/**"
      - "services/ecommerce-app-fastapi/**"
      - "services/ecommerce-app-spring/**"
      - "controlplane/api/**"
      - "services/frontend/ecommerce-app-frontend/frontend/**"
      - ".github/actions/**"
      - ".github/workflows/**"
  workflow_dispatch:
    inputs:
      aws_region:
        description: AWS region for the Terraform state bucket
        required: true
        default: ap-northeast-2
      project_name:
        description: Prefix used when naming the Terraform state bucket
        required: true
        default: devsecops

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.11.0"

jobs:
  bootstrap-state:
    name: Create or Reuse Terraform State Bucket
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/bootstrap
    env:
      EXISTING_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      PROJECT_NAME: ${{ inputs.project_name || 'devsecops' }}
      AWS_REGION: ${{ inputs.aws_region || 'ap-northeast-2' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region || 'ap-northeast-2' }}

      - name: Reuse existing or derive deterministic state bucket
        id: existing
        shell: bash
        run: |
          if [ -n "$EXISTING_STATE_BUCKET" ]; then
            if aws s3api head-bucket --bucket "$EXISTING_STATE_BUCKET" >/dev/null 2>&1; then
              echo "bucket_name=$EXISTING_STATE_BUCKET" >> "$GITHUB_OUTPUT"
              echo "needs_bootstrap=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "TF_STATE_BUCKET is set to '$EXISTING_STATE_BUCKET', but the bucket does not exist." >&2
            exit 1
          fi

          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          TARGET_BUCKET="${PROJECT_NAME}-tfstate-${ACCOUNT_ID}-${AWS_REGION}"

          if aws s3api head-bucket --bucket "$TARGET_BUCKET" >/dev/null 2>&1; then
            echo "bucket_name=$TARGET_BUCKET" >> "$GITHUB_OUTPUT"
            echo "needs_bootstrap=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "bucket_name=$TARGET_BUCKET" >> "$GITHUB_OUTPUT"
          echo "needs_bootstrap=true" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Setup Terraform
        if: steps.existing.outputs.needs_bootstrap == 'true'
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        if: steps.existing.outputs.needs_bootstrap == 'true'
        run: terraform init

      - name: Terraform Apply
        if: steps.existing.outputs.needs_bootstrap == 'true'
        run: >
          terraform apply -auto-approve -input=false
          -var="aws_region=${{ inputs.aws_region || 'ap-northeast-2' }}"
          -var="project_name=${{ inputs.project_name || 'devsecops' }}"

      - name: Capture created bucket name
        if: steps.existing.outputs.needs_bootstrap == 'true'
        id: created
        shell: bash
        run: |
          echo "bucket_name=$(terraform output -raw s3_bucket_name)" >> "$GITHUB_OUTPUT"

      - name: Resolve state bucket name
        id: resolved
        shell: bash
        run: |
          if [ -n "${{ steps.existing.outputs.bucket_name }}" ]; then
            echo "bucket_name=${{ steps.existing.outputs.bucket_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "bucket_name=${{ steps.created.outputs.bucket_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Write workflow summary
        env:
          STATE_BUCKET: ${{ steps.resolved.outputs.bucket_name }}
          NEEDS_BOOTSTRAP: ${{ steps.existing.outputs.needs_bootstrap }}
        shell: bash
        run: |
          {
            echo "## Terraform state bootstrap"
            echo ""
            echo "- Bucket: \`$STATE_BUCKET\`"
            if [ "$NEEDS_BOOTSTRAP" = "true" ]; then
              echo "- Result: created a new S3 state bucket."
            else
              echo "- Result: reused the existing S3 state bucket."
            fi
            echo "- Downstream Terraform workflow can still discover this bucket automatically."
            echo "- Next step: run \`terraform-dev-plan-apply.yml\`."
          } >> "$GITHUB_STEP_SUMMARY"          
