# CloudFront 뒤 Node API 메트릭 수집 (로컬 PC에서 Prometheus 실행)
#
# 반드시 이 파일이 있는 폴더(api-server)에서 실행해야 --config.file 경로가 맞습니다.
#
#   npm run prometheus
#     → Docker로 실행 (Docker Desktop 등 필요)
#   npm run prometheus:local
#     → prometheus.exe 를 PATH에 두거나, 이 폴더에 복사해 두고 실행
#
# 확인: http://127.0.0.1:9090 → Status → Targets (UP) → Graph에서 up 또는 http_requests_total
# 9090 포트 충돌 시: 예전 Prometheus 컨테이너/프로세스 종료 후 재실행, 또는 npm run prometheus:9091 → UI는 :9091

global:
  # scrape_timeout 은 scrape_interval 보다 짧거나 같아야 함
  scrape_interval: 30s
  scrape_timeout: 25s

scrape_configs:
  - job_name: ecommerce-node-api
    scheme: https
    metrics_path: /api/metrics
    static_configs:
      - targets:
          - d2xkz85otik7ek.cloudfront.net:443
